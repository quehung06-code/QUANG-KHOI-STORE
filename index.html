<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quang Khôi Store</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
            color: white;
            text-align: center;
        }

        header {
            background: #111;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #00ffcc;
        }

        .container {
            padding: 30px;
        }

        .card {
            background: #2b2b40;
            border-radius: 15px;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            box-shadow: 0 0 15px rgba(0,255,204,0.3);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .price {
            font-size: 24px;
            color: #00ffcc;
            margin: 10px 0;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin-top: 10px;
            background: #00ffcc;
            color: black;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .btn:hover {
            background: #00ccaa;
        }

        footer {
            margin-top: 30px;
            padding: 15px;
            background: #111;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    Quang Khôi Store ⚡
</header>

<div class="container">

    <div class="card">
        <h2>Tối ưu hiệu suất</h2>
        <p>✔ Tăng FPS<br>✔ Fix lag cho máy yếu</p>
        <div class="price">100K</div>
        <a class="btn" href="https://www.facebook.com/share/17JaaepW7V/" target="_blank">
            Liên hệ ngay
        </a>
    </div>

    <div class="card">
        <h2>Fake Lag</h2>
        <p>✔ Giúp chơi game dễ dàng hơn<br>✔ Không gặp trở ngại</p>
        <div class="price">50K</div>
        <a class="btn" href="https://www.facebook.com/share/17JaaepW7V/" target="_blank">
            Liên hệ ngay
        </a>
    </div>

</div>

<footer>
    © 2026 Quang Khôi Store
</footer>

</body>
</html>
